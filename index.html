<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Okta_Vibe — Showcase</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #2d1b4e 0%, #1a0b2e 50%, #4a154b 100%);
            --card-bg: rgba(255, 255, 255, 0.07);
            --neon-pink: #ff007f;
            --neon-purple: #bd00ff;
            --text-light: #f5f6fa;
            --text-muted: #a5a5c5;
        }

        html {
            width: 100%;
            height: 100%;
        }

        body {
            background-color: #1a0b2e;
            width: 100%;
            min-height: 100vh;
            color: var(--text-light);
            padding: 20px;
            overflow-x: hidden;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        .bg-fixed-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: var(--bg-gradient);
            z-index: -3;
            pointer-events: none;
        }

        .filter-btn, .lang-btn, .social-links a, .search-input {
            outline: none;
        }

        header, .search-container, .filter-container, .products-grid {
            position: relative;
            z-index: 2;
        }

        header {
            text-align: center;
            padding: 60px 20px 30px 20px;
            position: relative;
        }

        .lang-switcher {
            position: absolute;
            top: 15px;
            right: 15px;
            display: flex;
            gap: 8px;
            background: rgba(255, 255, 255, 0.05);
            padding: 4px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 10;
        }

        .lang-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 6px 12px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            transition: all 0.3s ease;
        }

        .lang-btn.active, .lang-btn:hover {
            background: linear-gradient(90deg, var(--neon-purple), var(--neon-pink));
            color: #fff;
            box-shadow: 0 0 10px rgba(189, 0, 255, 0.5);
        }

        header h1 {
            font-size: 3.5rem;
            color: #fff;
            text-shadow: 0 0 10px var(--neon-purple), 0 0 20px var(--neon-pink);
            margin-bottom: 10px;
            letter-spacing: 3px;
        }

        header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 15px;
        }

        .social-links a {
            color: #fff;
            text-decoration: none;
            background: rgba(255,255,255,0.05);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .social-links a:hover {
            background: var(--neon-pink);
            box-shadow: 0 0 15px var(--neon-pink);
            transform: translateY(-3px);
        }

        .search-container {
            position: relative;
            max-width: 500px;
            margin: 0 auto 30px auto;
            padding: 0 15px;
        }

        .search-input {
            width: 100%;
            padding: 12px 45px 12px 20px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .search-input:focus {
            border-color: var(--neon-purple);
            box-shadow: 0 0 15px rgba(189, 0, 255, 0.2);
            background: rgba(255, 255, 255, 0.1);
        }

        .search-icon {
            position: absolute;
            right: 32px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.1rem;
            color: var(--neon-pink);
            pointer-events: none;
            text-shadow: 0 0 8px rgba(255, 0, 127, 0.5);
        }

        .filter-container {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 40px;
            flex-wrap: wrap;
            max-width: 1000px;
            margin-left: auto;
            margin-right: auto;
            padding: 0 10px;
        }

        .filter-btn {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            color: var(--text-light);
            transition: all 0.3s ease;
            font-size: 0.9rem;
            white-space: nowrap;
        }

        .filter-btn.active, .filter-btn:hover {
            background: transparent;
            border-color: var(--neon-pink);
            color: #fff;
            box-shadow: 0 0 15px rgba(255, 0, 127, 0.4);
            transform: scale(1.05);
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
            padding-bottom: 40px;
        }

        .product-card {
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease, border-color 0.3s ease, opacity 0.4s ease;
            opacity: 0;
            transform: translateY(30px);
            display: flex;
            flex-direction: column;
        }

        .product-card.show {
            opacity: 1;
            transform: translateY(0);
        }

        .product-card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: var(--neon-purple);
            box-shadow: 0 15px 30px rgba(189, 0, 255, 0.3);
        }

        .img-wrapper {
            width: 100%;
            aspect-ratio: 3 / 4; 
            position: relative;
            background: #111;
            overflow: hidden;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .product-img {
            width: 100%;
            height: 100%;
            object-fit: cover; 
            position: relative;
            z-index: 2;
        }

        .product-info {
            padding: 15px;
            text-align: center;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            justify-content: space-between;
        }

        .product-title {
            font-size: 1.05rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: #fff;
            line-height: 1.4;
        }

        .product-price {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--neon-pink);
            text-shadow: 0 0 5px rgba(255, 0, 127, 0.5);
            margin-top: 5px;
        }

        .space-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: -2;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            font-size: 1.5rem;
            opacity: 0.3;
            animation: pulseGlow 4s infinite ease-in-out;
            animation-delay: var(--d);
        }

        .particle.star {
            color: #e0c3fc;
            text-shadow: 0 0 10px var(--neon-purple);
        }

        @keyframes pulseGlow {
            0%, 100% {
                transform: scale(0.8) translateY(0);
                opacity: 0.2;
            }
            50% {
                transform: scale(1.2) translateY(-8px);
                opacity: 0.6;
            }
        }

        @media (max-width: 600px) {
            body {
                padding: 10px;
            }
            header { 
                padding-top: 15px; 
                padding-bottom: 20px;
                display: flex;
                flex-direction: column;
                align-items: center;
            }
            .lang-switcher { 
                position: relative;
                top: 0; 
                right: 0; 
                transform: none; 
                width: max-content; 
                margin-bottom: 20px;
            }
            header h1 { font-size: 2.2rem; }
            
            .products-grid { 
                grid-template-columns: repeat(2, 1fr); 
                gap: 12px; 
                padding: 0 5px; 
            }
            .product-info {
                padding: 10px;
            }
            .product-title {
                font-size: 0.9rem;
            }
            .product-price {
                font-size: 1.1rem;
            }
            .filter-container { 
                display: flex; 
                flex-wrap: wrap;
                justify-content: center;
                gap: 8px; 
                padding: 0 10px; 
                margin-bottom: 25px;
            }
            .filter-btn { 
                padding: 8px 14px; 
                font-size: 0.8rem; 
                width: auto;
                white-space: nowrap;
            }
        }
    </style>
</head>
<body>

<div class="bg-fixed-layer"></div>

<div class="space-particles">
    <div class="particle star" style="top: 15%; left: 10%; --d: 0s;">✦</div>
    <div class="particle star" style="top: 25%; left: 80%; --d: 1.5s;">✧</div>
    <div class="particle star" style="top: 45%; left: 85%; --d: 0.7s;">✦</div>
    <div class="particle star" style="top: 60%; left: 15%; --d: 2.2s;">✧</div>
    <div class="particle star" style="top: 75%; left: 75%; --d: 1.2s;">✦</div>
</div>

<header>
    <div class="lang-switcher">
        <button class="lang-btn active" data-lang="am">AM</button>
        <button class="lang-btn" data-lang="ru">RU</button>
        <button class="lang-btn" data-lang="en">EN</button>
    </div>

    <h1 id="main-title">Okta_Vibe</h1>
    <p id="main-subtitle"></p>
    
    <div class="social-links">
        <a href="https://www.instagram.com/okta_vibe?igsh=amlnanVwaTBmc2Y0" target="_blank">Instagram</a>
        <a href="https://www.tiktok.com/@okta_vibe?_r=1&_t=ZS-97YRJlY6nSu" target="_blank">TikTok</a>
    </div>
</header>

<div class="search-container">
    <input type="text" id="search-input" class="search-input" placeholder="">
    <span class="search-icon">🔍</span>
</div>

<div class="filter-container">
    <button class="filter-btn active" data-filter="all" id="filter-all"></button>
    <button class="filter-btn" data-filter="keychain" id="filter-keychain"></button>
    <button class="filter-btn" data-filter="badge" id="filter-badge"></button>
    <button class="filter-btn" data-filter="figure" id="filter-figure"></button>
    <button class="filter-btn" data-filter="figure3d" id="filter-figure3d"></button>
    <button class="filter-btn" data-filter="stickers" id="filter-stickers"></button>
    <button class="filter-btn" data-filter="cards" id="filter-cards"></button>
</div>

<main class="products-grid" id="shop-grid"></main>

<script>
let currentLang = 'am';
let currentFilter = 'all';
let searchQuery = '';
let products = [];

const translations = {
    ru: {
        subtitle: "Эстетичная витрина товаров аниме",
        searchPlaceholder: "Поиск аниме или товара...",
        filterAll: "Всё меню",
        filterKeychain: "Брелки",
        filterBadge: "Значки",
        filterFigure: "Фигурки",
        filterFigure3d: "3D Статуэтки",
        filterStickers: "Стикеры",
        filterCards: "Карточки",
        loading: "Загрузка космического меню...",
        empty: "Ничего не найдено"
    },
    am: {
        subtitle: "Անիմե տեսականու էսթետիկ ցուցափեղկ",
        searchPlaceholder: "Որոնում...",
        filterAll: "Ամբողջ տեսականին",
        filterKeychain: "Բրելոկներ",
        filterBadge: "Կրծքանշաններ",
        filterFigure: "Արձանիկներ",
        filterFigure3d: "3D Արձանիկներ",
        filterStickers: "Ստիկերներ",
        filterCards: "Քարտեր",
        loading: "Տեսականին բեռնվում է...",
        empty: "Ոչինչ չի գտնվել"
    },
    en: {
        subtitle: "Aesthetic Anime Merchandise Showcase",
        searchPlaceholder: "Search anime or items...",
        filterAll: "All Menu",
        filterKeychain: "Keychains",
        filterBadge: "Badges",
        filterFigure: "Figures",
        filterFigure3d: "3D Figures",
        filterStickers: "Stickers",
        filterCards: "Cards",
        loading: "Loading space menu...",
        empty: "Nothing found"
    }
};

const categoryMap = {
    // Բրելոկներ / Брелки
    'բրելոկ': 'keychain',
    'բրելոկներ': 'keychain',
    'брелок': 'keychain',
    'брелки': 'keychain',
    'keychain': 'keychain',
    'keychains': 'keychain',

    // Կրծքանշաններ / Значки
    'կրծքանշան': 'badge',
    'կրծքանշաններ': 'badge',
    'значок': 'badge',
    'значки': 'badge',
    'badge': 'badge',
    'badges': 'badge',

    // Սովորական Արձանիկներ / Обычные Фигурки
    'արձանիկ': 'figure',
    'արձանիկներ': 'figure',
    'ֆիգուրկա': 'figure',
    'фигурка': 'figure',
    'фигурки': 'figure',
    'figure': 'figure',
    'figures': 'figure',

    // 3Դ արձանիկներ / 3D Статуэтки
    '3դ արձանիկներ': 'figure3d',
    '3դ արձանիկ': 'figure3d',
    '3d արձանիկ': 'figure3d',
    '3d արձանիկներ': 'figure3d',
    '3d статуэтки': 'figure3d',
    '3d статуэтка': 'figure3d',
    'статуэтка': 'figure3d',
    'статуэтки': 'figure3d',
    '3d фигурки': 'figure3d',
    '3d фигурка': 'figure3d',
    '3d figure': 'figure3d',
    '3d figures': 'figure3d',

    // Ստիկերներ / Стикеры
    'ստիկեր': 'stickers',
    'ստիկերներ': 'stickers',
    'стикер': 'stickers',
    'стикеры': 'stickers',
    'sticker': 'stickers',
    'stickers': 'stickers',

    // Քարտեր / Карточки
    'քարտ': 'cards',
    'քարտեր': 'cards',
    'карточка': 'cards',
    'карточки': 'cards',
    'card': 'cards',
    'cards': 'cards'
};

const grid = document.getElementById('shop-grid');
const filterButtons = document.querySelectorAll('.filter-btn');
const langButtons = document.querySelectorAll('.lang-btn');
const searchInput = document.getElementById('search-input');

function parseCSVLine(text) {
    let p = '', r = [];
    let q = false;
    for (let i = 0; i < text.length; i++) {
        let c = text[i];
        if (c === '"') { q = !q; }
        else if (c === ',' && !q) { r.push(p.trim()); p = ''; }
        else { p += c; }
    }
    r.push(p.trim());
    return r;
}

async function loadProductsFromCSV() {
    grid.innerHTML = `<div style="text-align:center; width:100%; color:var(--text-muted); font-weight:600; padding: 40px;">${translations[currentLang].loading}</div>`;
    
    try {
        let csvUrl = 'inventory_export_2026-06-18.csv?v=' + Date.now();
        if (window.location.protocol === 'blob:') {
            try {
                const blobTarget = window.location.href.replace(/^blob:/, '');
                const targetUrl = new URL(blobTarget);
                csvUrl = targetUrl.origin + '/' + csvUrl;
            } catch (e) {
                csvUrl = '/' + csvUrl;
            }
        }

        const response = await fetch(csvUrl);
        if (!response.ok) throw new Error('Файл CSV не найден.');
        
        const data = await response.text();
        const lines = data.split('\n').map(line => line.replace('\r', '').trim());
        products = [];
        
        for (let i = 1; i < lines.length; i++) {
            if (!lines[i]) continue;
            
            const columns = parseCSVLine(lines[i]);
            if (columns.length < 4) continue;
            
            const itemNumber = columns[0]; 
            const animeName = columns[1];  
            const rawType = columns[2];    
            const price = columns[3] + " ֏";
            
            const cleanType = rawType.toLowerCase().trim();
            const category = categoryMap[cleanType] || 'all';
            
            let imgUrl = `/img/product_${itemNumber}.png`;
            for (let col of columns) {
                if (typeof col === 'string' && (col.startsWith('http://') || col.startsWith('https://'))) {
                    imgUrl = col;
                    break;
                }
            }
            
            products.push({
                id: itemNumber,
                title: { am: animeName, ru: animeName, en: animeName },
                itemType: rawType, 
                category: category,
                price: price,
                img: imgUrl
            });
        }

        renderProducts();
    } catch (error) {
        console.error(error);
        grid.innerHTML = `<div style="text-align:center; width:100%; color:var(--neon-pink); padding: 40px; font-weight:600;">
            Error loading inventory file.<br>
            <span style="font-size:0.85rem; color:var(--text-muted); display:block; margin-top:10px;">
                ${error.message}
            </span>
        </div>`;
    }
}

function updateInterfaceText() {
    const subtitleEl = document.getElementById('main-subtitle');
    if (subtitleEl) subtitleEl.innerText = translations[currentLang].subtitle;
    
    const ids = {
        'filter-all': 'filterAll',
        'filter-keychain': 'filterKeychain',
        'filter-badge': 'filterBadge',
        'filter-figure': 'filterFigure',
        'filter-figure3d': 'filterFigure3d',
        'filter-stickers': 'filterStickers',
        'filter-cards': 'filterCards'
    };
    
    for (const [id, key] of Object.entries(ids)) {
        const el = document.getElementById(id);
        if (el) el.innerText = translations[currentLang][key];
    }
    
    if (searchInput) searchInput.placeholder = translations[currentLang].searchPlaceholder;
}

function renderProducts() {
    grid.innerHTML = ''; 
    
    const filtered = products.filter(p => {
        const matchesCategory = currentFilter === 'all' || p.category === currentFilter;
        
        const localTitle = (p.title[currentLang] || p.title['am']).toLowerCase();
        const typeText = p.itemType.toLowerCase();
        const search = searchQuery.toLowerCase();
        const matchesSearch = localTitle.includes(search) || typeText.includes(search);
        
        return matchesCategory && matchesSearch;
    });

    if (filtered.length === 0 && products.length > 0) {
        grid.innerHTML = `<div style="text-align:center; width:100%; color:var(--text-muted); padding: 40px; font-weight:600;">${translations[currentLang].empty}</div>`;
        return;
    }

    filtered.forEach((prod, index) => {
        const card = document.createElement('div');
        card.className = 'product-card';
        const localTitle = prod.title[currentLang] || prod.title['am'];

        card.innerHTML = `
            <div class="img-wrapper">
                <img src="${prod.img}" alt="${localTitle}" class="product-img" onerror="this.src='https://via.placeholder.com/300x400/1a0b2e/ffffff?text=Okta+Vibe'">
            </div>
            <div class="product-info">
                <div>
                    <div class="product-title">${localTitle}</div>
                    <div style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 5px; font-style: italic;">${prod.itemType}</div>
                </div>
                <div class="product-price">${prod.price}</div>
            </div>
        `;
        
        grid.appendChild(card);

        setTimeout(() => {
            card.classList.add('show');
        }, index * 30); 
    });
}

searchInput.addEventListener('input', (e) => {
    searchQuery = e.target.value;
    renderProducts();
});

langButtons.forEach(btn => {
    btn.addEventListener('click', (e) => {
        langButtons.forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        currentLang = e.target.getAttribute('data-lang');
        updateInterfaceText();
        renderProducts(); 
    });
});

filterButtons.forEach(btn => {
    btn.addEventListener('click', (e) => {
        filterButtons.forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        currentFilter = e.target.getAttribute('data-filter');
        renderProducts();
    });
});

updateInterfaceText();
loadProductsFromCSV();
</script>
</body>
</html>
